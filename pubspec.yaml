name: nexus_gym
description: Next-Gen AI-Powered Gym App with Neumorphic Design, LLM Coach & Metaverse Features
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # UI & Animations
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  expandable: ^5.0.1

  # Haptics
  haptic_feedback: ^0.1.0+2

  # AI / HTTP
  http: ^1.2.0
  dio: ^5.4.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.7
  injectable: ^2.3.2
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.0.0
  sensors_plus: ^5.0.1

  # Icons
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^6.0.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - .env